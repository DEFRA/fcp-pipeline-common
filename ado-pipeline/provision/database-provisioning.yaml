parameters:
  - name: subscription
    type: string 
steps:
  - task: AzureCLI@2
    displayName: 'Database Provisioning'
    condition: eq(variables['DbCheck.hasDatabase'], 'true')
    inputs:
      azureSubscription: ${{ parameters.subscription }}
      scriptType: bash
      scriptLocation: inlineScript
      inlineScript: |
        echo "##[debug]Creating the database"

        # "$(prOrBranchNo)"

        DB_FULL_NAME=$(DbCheck.databaseName)
        DATABASE_HOST=$(targetEnvironment)$(sqlflexiServerName).postgres.database.azure.com
        DATABASE_ADMIN=$(sqlpostgresflexiAADGroupName)
        echo "##[debug]database name: $DB_FULL_NAME"

        # Check if the database is exist!
        isExist=$(docker run --rm --name psql-runner \
                -e POSTGRES_HOST_AUTH_METHOD=trust \
                -e PGPASSWORD=$(az account get-access-token --resource-type oss-rdbms --query accessToken --output tsv) \
                -e PGHOST="$DATABASE_HOST" \
                -e PGUSER="$DATABASE_ADMIN" \
                -e PGDATABASE=postgres \
                alpine/psql -lqt | cut -d \| -f 1 | grep "$DB_FULL_NAME")

        if [[ $isExist ]]; then
          echo "##[debug]The database $DB_FULL_NAME is already exists"
        else
          echo "##[debug]The database $DB_FULL_NAME is not exists and will be created"

          createCommand="CREATE DATABASE \"$DB_FULL_NAME\""

          docker run --rm --name psql-runner \
                  -e POSTGRES_HOST_AUTH_METHOD=trust \
                  -e PGPASSWORD=$(az account get-access-token --resource-type oss-rdbms --query accessToken --output tsv) \
                  -e PGHOST="$DATABASE_HOST" \
                  -e PGUSER="$DATABASE_ADMIN" \
                  -e PGDATABASE=postgres \
                  alpine/psql -c "$createCommand"
        fi
