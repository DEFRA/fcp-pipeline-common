parameters:
  - name: subscription
    type: string
  - name: isTemporary
    type: boolean
    default: false
steps:
  - ${{ if eq(parameters.isTemporary, True) }}:
      - task: AzureCLI@2
        displayName: 'Creating Schema'
        condition: eq(variables['DbCheck.hasDatabase'], 'true')
        inputs:
          azureSubscription: ${{ parameters.subscription }}
          scriptType: bash
          scriptLocation: inlineScript
          inlineScript: |
            echo "##[debug]Creating a temporary schema for the deployment"
            source ./fcp-pipeline-common/common/shared_functions.sh
            SCHEMA_NAME=$(get_schema_name "$(appName)" "${{ parameters.isTemporary }}" "$(prOrBranchNo)")
            DATABASE_HOST=$(targetEnvironment)$(sqlflexiServerName).postgres.database.azure.com
            DB_FULL_NAME=$(DbCheck.databaseName)

            echo "##[debug]Creating the Schema: $SCHEMA_NAME in the Database: $DB_FULL_NAME in $DATABASE_HOST"
            createCommand="CREATE SCHEMA IF NOT EXISTS \"${SCHEMA_NAME}\""

            RESULT=$(run_db_command "$(sqlpostgresflexiAADGroupName)" "$DATABASE_HOST" "$DB_FULL_NAME" "$createCommand")
            echo "##[debug]RESULT"

  - task: CopyFiles@2
    inputs:
      SourceFolder: '$(appName)/changelog'
      Contents: '*.xml'
      TargetFolder: './changelog'
    displayName: 'Staging changelogs'

  - task: AzureCLI@2
    displayName: 'Migrating db changes'
    condition:
    inputs:
      azureSubscription: ${{ parameters.subscription }}
      scriptType: bash
      scriptLocation: inlineScript
      inlineScript: |
        echo "##[debug]Migrating the database"
        
        source ./fcp-pipeline-common/common/shared_functions.sh

        SCHEMA_NAME=$(get_schema_name "$(appName)" "${{ parameters.isTemporary }}" "$(prOrBranchNo)")
        DATABASE_HOST=$(targetEnvironment)$(sqlflexiServerName).postgres.database.azure.com
        DB_FULL_NAME=$(DbCheck.databaseName)

        RESULT=$(run_db_migration "$(sqlpostgresflexiAADGroupName)" "$DATABASE_HOST" "$SCHEMA_NAME" "$DB_FULL_NAME")
        echo "##[debug]$RESULT"

